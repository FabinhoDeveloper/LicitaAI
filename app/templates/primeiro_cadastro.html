<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LicitAI - Primeiro Cadastro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #003d7a;
            --primary-dark: #002a55;
            --secondary-color: #ffb800;
            --secondary-dark: #e09c00;
            --light-bg: #f4f7fb;
            --text-dark: #1a2a44;
            --text-muted: #5a6a85;
            --border-color: #e3e9f2;
        }

        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--light-bg);
            color: var(--text-dark);
        }

        .top-bar {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: #fff;
            padding: 8px 0;
            font-size: 0.85rem;
        }
        .top-bar a {
            color: #fff;
            text-decoration: none;
            margin-right: 18px;
        }
        .top-bar a:hover { color: var(--secondary-color); }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .cadastro-wrapper {
            width: 100%;
            max-width: 480px;
        }

        .brand-section {
            text-align: center;
            margin-bottom: 24px;
        }
        .brand-section .project-name {
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--primary-color);
            letter-spacing: -0.5px;
            line-height: 1;
            margin-bottom: 4px;
        }
        .brand-section .project-name span {
            color: var(--secondary-dark);
        }
        .brand-section .tagline {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .cadastro-box {
            background: #fff;
            border-radius: 14px;
            padding: 36px 32px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 61, 122, 0.10);
        }
        .cadastro-box h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 6px;
            text-align: center;
        }
        .cadastro-box .cadastro-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .cadastro-box .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-dark);
            margin-bottom: 6px;
        }
        .cadastro-box .form-control {
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 0.95rem;
            color: var(--text-dark);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .cadastro-box .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(0, 61, 122, 0.12);
        }
        .btn-cadastrar {
            background: linear-gradient(135deg, var(--secondary-color), var(--secondary-dark));
            color: var(--primary-dark);
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: all 0.2s;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-cadastrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(224, 156, 0, 0.3);
        }
        .alert {
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 18px;
        }
        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: #fff;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 18px;
        }

        .password-wrapper {
            position: relative;
        }
        .password-wrapper .form-control {
            padding-right: 45px;
        }
        .password-toggle {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px 10px;
            font-size: 1.15rem;
            line-height: 1;
            z-index: 5;
            transition: color 0.15s;
        }
        .password-toggle:hover {
            color: var(--primary-color);
        }

        footer {
            background-color: #0f1a2e;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            padding: 18px 0;
            font-size: 0.85rem;
        }
        footer span {
            color: var(--secondary-color);
            font-weight: 600;
        }

        @media (max-width: 576px) {
            .cadastro-box { padding: 28px 20px; }
            .brand-section .project-name { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="container d-flex justify-content-center">
            <a href="https://queluz.sp.gov.br" target="_blank" rel="noopener">
                <i class="bi bi-building"></i> Prefeitura Municipal de Queluz
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="cadastro-wrapper">

            <div class="brand-section">
                <h1 class="project-name">Licit<span>AI</span></h1>
                <p class="tagline">Inteligência em Licitações</p>
            </div>

            <div class="cadastro-box">
                <h2>Primeiro Cadastro</h2>
                <p class="cadastro-subtitle">Configure a conta do administrador do sistema</p>

                <div class="text-center">
                    <span class="admin-badge">
                        <i class="bi bi-shield-lock-fill"></i> Administrador
                    </span>
                </div>

                {% if erro %}
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle-fill"></i> {{ erro }}
                </div>
                {% endif %}

                <form action="/primeiro-cadastro" method="post" novalidate>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" placeholder="Nome" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Sobrenome</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Sobrenome" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="matricula" class="form-label">Matrícula</label>
                        <input type="text" class="form-control" id="matricula" name="matricula" placeholder="Digite sua matrícula" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Digite seu e-mail" required>
                    </div>

                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-control" id="senha" name="senha" placeholder="Crie uma senha segura" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('senha')" title="Mostrar/ocultar senha">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmar_senha" class="form-label">Confirme a senha</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-control" id="confirmar_senha" name="confirmar_senha" placeholder="Repita a senha" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmar_senha')" title="Mostrar/ocultar senha">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-cadastrar">
                        <i class="bi bi-person-plus"></i> Criar conta de administrador
                    </button>
                </form>
            </div>

        </div>
    </div>

    <footer>
        Desenvolvido por <span>Prefeitura Municipal de Queluz</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const icon = input.parentElement.querySelector('.password-toggle i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
