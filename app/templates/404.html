<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LicitAI - Página não encontrada</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #003d7a;
            --primary-dark: #002a55;
            --secondary-color: #ffb800;
            --secondary-dark: #e09c00;
            --accent-color: #00a859;
            --light-bg: #f4f7fb;
            --text-dark: #1a2a44;
            --text-muted: #5a6a85;
            --border-color: #e3e9f2;
        }

        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--light-bg);
            color: var(--text-dark);
        }

        .top-bar {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: #fff;
            padding: 8px 0;
            font-size: 0.85rem;
        }
        .top-bar a {
            color: #fff;
            text-decoration: none;
        }
        .top-bar a:hover { color: var(--secondary-color); }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .notfound-card {
            text-align: center;
            max-width: 500px;
        }
        .notfound-card .error-code {
            font-size: 7rem;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
            opacity: 0.15;
            margin-bottom: -20px;
        }
        .notfound-card h2 {
            font-weight: 800;
            color: var(--primary-color);
            font-size: 1.6rem;
            margin-bottom: 12px;
        }
        .notfound-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 28px;
        }
        .notfound-card .btn-home {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .notfound-card .btn-home:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 61, 122, 0.25);
            color: #fff;
        }
        .notfound-card .bi-exclamation-triangle {
            font-size: 3.5rem;
            color: var(--secondary-color);
            margin-bottom: 16px;
            display: block;
        }

        footer {
            background-color: #0f1a2e;
            color: rgba(255,255,255,0.7);
            text-align: center;
            padding: 18px 0;
            font-size: 0.85rem;
        }
        footer span { color: var(--secondary-color); font-weight: 600; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="container d-flex justify-content-center">
            <a href="https://queluz.sp.gov.br" target="_blank" rel="noopener">
                <i class="bi bi-building"></i> Prefeitura Municipal de Queluz
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="notfound-card">
            <div class="error-code">404</div>
            <i class="bi bi-exclamation-triangle"></i>
            <h2>Página não encontrada</h2>
            <p>A rota que você tentou acessar não existe. Verifique o endereço ou volte para a página inicial.</p>
            <a href="/" class="btn-home">
                <i class="bi bi-house-door"></i> Voltar ao início
            </a>
        </div>
    </div>

    <footer>
        Desenvolvido por <span>Prefeitura Municipal de Queluz</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
