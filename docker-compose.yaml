services:
  mysql:
    image: mysql:8.0
    container_name: licitai-mysql
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: licitai
      MYSQL_USER: licitai
      MYSQL_PASSWORD: licitai
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
